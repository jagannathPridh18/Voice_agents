name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # Config files location
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          # Prefer a PAT (so the release tag can trigger downstream deploy
          # workflows); fall back to the built-in GITHUB_TOKEN when it's unset
          # so this doesn't hard-fail on forks without the secret configured.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}