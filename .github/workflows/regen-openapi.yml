name: Regenerate OpenAPI (temp)

# Temporary helper: regenerates docs/api-reference/openapi.json in the same
# environment the drift check uses (so it matches byte-for-byte) and commits it
# back to the branch. Removed after use.

on:
  push:
    branches: [feat/aws-ecs-terraform-cicd]
    paths: [".github/workflows/regen-openapi.yml"]

permissions:
  contents: write

jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Create venv
        run: |
          python -m venv .venv
          echo "${{ github.workspace }}/.venv/bin" >> "$GITHUB_PATH"

      - name: Install api + pipecat deps
        run: ./scripts/setup_requirements.sh --dev

      - name: Dump OpenAPI spec
        env:
          DATABASE_URL: postgresql+asyncpg://dummy:dummy@localhost/dummy
          REDIS_URL: redis://localhost:6379/0
          ENABLE_AWS_S3: "false"
          MINIO_PUBLIC_ENDPOINT: http://localhost:9000
          DEPLOYMENT_MODE: oss
        run: python -u -m scripts.dump_docs_openapi

      - name: Commit if changed
        run: |
          if git diff --quiet docs/api-reference/openapi.json; then
            echo "openapi.json already in sync — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/api-reference/openapi.json
          git commit -m "chore: regenerate openapi.json (sync with FastAPI routes)"
          git push
