name: Terraform (AWS infra)

on:
  pull_request:
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform.yml"
  push:
    branches: [main]
    paths:
      - "infra/terraform/**"
  workflow_dispatch:
    inputs:
      action:
        description: "plan or apply"
        type: choice
        options: [plan, apply]
        default: plan

permissions:
  id-token: write # OIDC
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.9.8"
  WORKDIR: infra/terraform

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # fmt + validate — no AWS needed, so this runs (and can go green) on every PR
  # even before the state backend / OIDC role exist.
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Format check
        run: terraform fmt -check -recursive
      - name: Init (no backend)
        run: terraform init -backend=false -input=false
      - name: Validate
        run: terraform validate

  # plan on PRs — skipped until AWS_TERRAFORM_ROLE_ARN is configured (i.e. after
  # the one-time bootstrap apply), so PRs stay green in the meantime.
  plan:
    needs: validate
    if: github.event_name == 'pull_request' && vars.AWS_TERRAFORM_ROLE_ARN != ''
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="key=${{ vars.TF_STATE_KEY }}"
      - name: Plan
        run: terraform plan -var-file=prod.tfvars -no-color -out=tfplan
      - name: Comment plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const plan = execSync('terraform show -no-color tfplan', { cwd: '${{ env.WORKDIR }}' }).toString();
            const body = `#### Terraform Plan 📖\n\`\`\`\n${plan.slice(0, 60000)}\n\`\`\``;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

  # apply on merge to main (or manual dispatch=apply) — gated on the role var
  # AND the production environment (approval).
  apply:
    needs: validate
    if: >-
      (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'))
      && vars.AWS_TERRAFORM_ROLE_ARN != ''
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="key=${{ vars.TF_STATE_KEY }}"
      - name: Apply
        run: terraform apply -var-file=prod.tfvars -auto-approve
